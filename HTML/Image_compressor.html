<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageCompress | Local Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dropzone-active { border-color: #3b82f6; background-color: #eff6ff; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">
                Image Compress Tool
            </h1>
            <p class="mt-3 text-slate-600">Secure, browser-based compression. Made by Prikshit.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Settings Sidebar -->
            <aside class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="sliders-horizontal" class="w-5 h-5"></i> Settings
                    </h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Quality (0.1 - 1.0)</label>
                            <input type="range" id="quality" min="0.1" max="1.0" step="0.1" value="0.8" 
                                   class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            <div class="flex justify-between text-xs text-slate-500 mt-2">
                                <span>Small Size</span>
                                <span id="qualityVal" class="font-bold text-blue-600">0.8</span>
                                <span>High Quality</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Max Width/Height (px)</label>
                            <input type="number" id="maxWidth" value="1920" 
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>

                        <button id="previewBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i data-lucide="eye" class="w-5 h-5"></i> Show Preview
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="lg:col-span-2 space-y-6">
                <!-- Dropzone -->
                <div id="dropzone" class="relative border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center hover:border-blue-400 transition-colors cursor-pointer bg-white">
                    <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="flex flex-col items-center" id="dropzoneContent">
                        <div class="bg-blue-50 p-3 rounded-full mb-3">
                            <i data-lucide="upload-cloud" class="w-6 h-6 text-blue-600"></i>
                        </div>
                        <p class="text-md font-semibold">Select an image to compress</p>
                        <p id="fileNameDisplay" class="text-sm text-blue-600 mt-1 italic"></p>
                    </div>
                </div>

                <!-- Single Preview Area -->
                <div id="previewContainer" class="hidden animate-in fade-in duration-500">
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <div class="p-4 flex items-center justify-between border-b border-slate-100 bg-slate-50/50">
                            <span class="font-bold text-sm text-slate-700 uppercase tracking-wide">Compression Result</span>
                            <div id="statusBadge"></div>
                        </div>
                        
                        <div class="p-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Original -->
                                <div class="space-y-2">
                                    <p class="text-xs font-bold text-slate-400 uppercase">Original</p>
                                    <div class="relative aspect-video bg-slate-100 rounded-lg overflow-hidden border border-slate-200">
                                        <img id="originalImg" class="w-full h-full object-contain">
                                    </div>
                                    <p id="originalSizeText" class="text-sm font-medium text-slate-600"></p>
                                </div>
                                <!-- Compressed -->
                                <div class="space-y-2">
                                    <p class="text-xs font-bold text-green-600 uppercase">Compressed</p>
                                    <div class="relative aspect-video bg-slate-100 rounded-lg overflow-hidden border border-slate-200">
                                        <img id="compressedImg" class="w-full h-full object-contain">
                                        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white/80 hidden">
                                            <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <p id="compressedSizeText" class="text-sm font-bold text-slate-900"></p>
                                        <a id="downloadLink" href="#" download class="text-blue-600 hover:underline text-sm font-bold flex items-center gap-1">
                                            <i data-lucide="download" class="w-4 h-4"></i> Download
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const previewBtn = document.getElementById('previewBtn');
        const qualityInput = document.getElementById('quality');
        const qualityVal = document.getElementById('qualityVal');
        const maxWidthInput = document.getElementById('maxWidth');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        
        // Preview Elements
        const previewContainer = document.getElementById('previewContainer');
        const originalImg = document.getElementById('originalImg');
        const compressedImg = document.getElementById('compressedImg');
        const originalSizeText = document.getElementById('originalSizeText');
        const compressedSizeText = document.getElementById('compressedSizeText');
        const downloadLink = document.getElementById('downloadLink');
        const loader = document.getElementById('loader');
        const statusBadge = document.getElementById('statusBadge');

        let currentFile = null;

        qualityInput.addEventListener('input', (e) => {
            qualityVal.textContent = e.target.value;
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                currentFile = e.target.files[0];
                fileNameDisplay.textContent = `Selected: ${currentFile.name}`;
            }
        });

        previewBtn.addEventListener('click', async () => {
            if (!currentFile) {
                alert("Please select an image first!");
                return;
            }

            // Reset UI for new compression
            previewContainer.classList.remove('hidden');
            loader.classList.remove('hidden');
            compressedImg.style.opacity = '0.3';
            
            // Show original
            originalImg.src = URL.createObjectURL(currentFile);
            originalSizeText.textContent = `${(currentFile.size / 1024).toFixed(2)} KB`;

            try {
                const options = {
                    maxSizeMB: 1,
                    maxWidthOrHeight: parseInt(maxWidthInput.value),
                    useWebWorker: true,
                    initialQuality: parseFloat(qualityInput.value)
                };

                const compressedFile = await imageCompression(currentFile, options);
                const compressedUrl = URL.createObjectURL(compressedFile);
                
                // Update Compressed view
                compressedImg.src = compressedUrl;
                compressedImg.style.opacity = '1';
                compressedSizeText.textContent = `${(compressedFile.size / 1024).toFixed(2)} KB`;
                
                // Update Download Link
                downloadLink.href = compressedUrl;
                downloadLink.download = `compressed_${currentFile.name}`;

                // Calculate Savings
                const savings = (((currentFile.size - compressedFile.size) / currentFile.size) * 100).toFixed(1);
                statusBadge.innerHTML = `<span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">Saved ${savings}%</span>`;

                loader.classList.add('hidden');
                lucide.createIcons();
            } catch (error) {
                console.error(error);
                loader.classList.add('hidden');
                alert("Compression failed. Try a different image.");
            }
        });
    </script>
</body>
</html>
